[pytest]
testpaths = tests
norecursedirs = .git .venv venv config config/kometa config/kometa/kometa-venv
addopts = -q -m "not e2e"
markers =
    e2e: browser-based end-to-end tests
    ratings_matrix: full ratings placement matrix contract tests
    ratings_artifacts: generate ratings matrix canvas/yaml artifact bundles
